<!DOCTYPE html>
<html>
<head>
  <title>Checkout - FashionHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/checkout.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


</head>
<body class="bg-light">
<script>
  const pending = JSON.parse(localStorage.getItem("pendingBuy")) || [];
  if (localStorage.getItem("isLoggedIn") !== "true" || pending.length === 0) {
    window.location.href = "index.html";
  }
</script>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h4><i class="bi bi-box-seam"></i> Order Summary</h4>

        </div>
        <div class="card-body">
          <div id="orderItems" class="mb-4"></div>
          <hr>
          <h5 class="text-end">Total: ₹<span id="totalPrice" class="text-danger fw-bold fs-3"></span></h5>
        </div>
      </div>

      <div class="card mt-4 shadow">
        <div class="card-header bg-primary text-white">
          <h5><i class="bi bi-geo-alt"></i> Delivery Details</h5>

        </div>
        <div class="card-body">
          <input type="text" class="form-control mb-3 order-input" placeholder="Full Name" id="name">
          <input type="text" class="form-control mb-3 order-input" placeholder="Address" id="address">
          <input type="text" class="form-control mb-3 order-input" placeholder="City" id="city">
          <input type="text" class="form-control mb-3 order-input" placeholder="Pincode" id="pincode">
          <input type="tel" class="form-control mb-3 order-input" placeholder="Phone Number" id="phone">
        </div>
        <div class="card-footer">
          <button class="btn btn-success w-100 btn-lg" onclick="placeOrder()">
  <i class="bi bi-check-circle"></i> Place Order
</button>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
