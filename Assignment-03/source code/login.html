<!DOCTYPE html>
<html>
<head>
  <title>Login - FashionHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .fashion-footer {
  background: #0b418e;  /* Dark blue background */
  color: #fff;           /* White text */
  padding-top: 25px;
  padding-bottom: 10px;
}

.fashion-footer a {
  color: #fff;
  text-decoration: none;
}

.fashion-footer a:hover {
  color: #d1e4ff;
  text-decoration: underline;
}

.fashion-footer .border-top {
  border-color: rgba(255, 255, 255, 0.3); /* light border line */
}

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #7bb6f5, #2f7fe6);
      display: flex;
      flex-direction: column;   /* 🔥 FIX */
      font-family: 'Poppins', sans-serif;
    }

    .login-card {
      background: linear-gradient(180deg, #6fb1f7, #1f6fe0);
      border-radius: 22px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      padding: 35px 30px;
      color: #fff;
    }

    .login-card h3 {
      font-weight: 600;
      margin-bottom: 25px;
    }

    .form-control {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 12px 15px;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.8);
    }

    .form-control:focus {
      box-shadow: none;
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    .btn-primary {
      background: #ffffff;
      color: #2f7fe6;
      border: none;
      border-radius: 30px;
      padding: 12px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background: #f1f1f1;
      transform: scale(1.03);
      color: #2f7fe6;
    }

    a {
      color: #ffffff;
      font-weight: 500;
      text-decoration: underline;
    }

    a:hover {
      color: #e6e6e6;
    }
    .fashion-footer p {
  margin-bottom: 6px;
}

  </style>
</head>

<body>

<!-- LOGIN SECTION (CENTERED) -->
<main class="flex-grow-1 d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="col-md-4 mx-auto login-card">
      <h3 class="text-center mb-3">Login</h3>

      <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
      <input type="password" id="loginPassword" class="form-control mb-4" placeholder="Password">

      <button class="btn btn-primary w-100" onclick="login()">Login</button>

      <p class="mt-4 text-center">
        New user? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>

<!-- FOOTER -->
<footer class="fashion-footer w-100">

  <div class="container">
    <div class="row py-3">

      <div class="col-md-4 mb-4">
        <h4 class="fw-bold">FashionHub</h4>
        <p>Your one-stop destination for trendy fashion, exclusive deals, and stylish collections.</p>
      </div>

      <div class="col-md-4 mb-4 text-md-center">
        <h5 class="fw-semibold">Quick Links</h5>
        <div class="footer-inline-links mt-3">
          <a href="index.html">Home</a> |
          <a href="shop.html">Shop</a> |
          <a href="cart.html">Cart</a> |
          <a href="login.html">Login</a>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <h5 class="fw-semibold">Contact Us</h5>
        <p>Pune, India</p>
        <p>support@fashionhub.com</p>
        <p>+91 99999 99999</p>
      </div>

    </div>

    <div class="text-center border-top pt-3">
      <p class="mb-0">&copy; 2026 FashionHub. All Rights Reserved.</p>
    </div>
  </div>
</footer>

</body>
</html>
