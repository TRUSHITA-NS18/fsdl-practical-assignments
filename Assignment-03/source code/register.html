<!DOCTYPE html>
<html>
<head>
  <title>Register - FashionHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #7bb6f5, #2f7fe6);
    }

    main {
      flex: 1; /* ensures footer sticks to bottom if page content is short */
      display: flex;
      align-items: center;
      justify-content: center;
    }
.fashion-footer p {
  margin-bottom: 6px;
}

    /* Card styling */
    .card {
      background: linear-gradient(180deg, #6fb1f7, #1f6fe0);
      border-radius: 22px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.3);
      padding: 35px 30px;
      color: #fff;
      border: none;
    }

    .card h3 {
      font-weight: 600;
      margin-bottom: 25px;
      color: #ffffff;
    }

    /* Inputs */
    .form-control {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      border-radius: 14px;
      padding: 12px 15px;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.8);
    }

    .form-control:focus {
      box-shadow: none;
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    /* Register button */
    .btn-success {
      background: #ffffff;
      color: #2f7fe6;
      border: none;
      border-radius: 30px;
      padding: 12px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-success:hover {
      background: #f1f1f1;
      transform: scale(1.03);
      color: #2f7fe6;
    }

    /* Links */
    a {
      color: #ffffff;
      font-weight: 500;
      text-decoration: underline;
    }

    a:hover {
      color: #e6e6e6;
    }

    p {
      color: #ffffff;
    }

    /* FOOTER */
    .fashion-footer {
      background-color: #0b418e; /* New footer color */
      color: #fff;
      text-align: center;
      padding-top: 25px;
      padding-bottom: 10px;
      width: 100%;
    }

    .fashion-footer a {
      color: #fff;
      text-decoration: none;
      margin: 0 5px;
    }

    .fashion-footer a:hover {
      color: #d1e4ff;
      text-decoration: underline;
    }

    .fashion-footer .border-top {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .fashion-footer .social-icons a {
      margin: 0 5px;
      color: #fff;
      font-size: 18px;
    }
  </style>
</head>

<body>

<main>
  <div class="container">
    <div class="col-md-4 mx-auto card p-4">
      <h3 class="text-center mb-3">Register</h3>

      <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email">
      <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password">

      <button class="btn btn-success w-100" onclick="register()">Register</button>

      <p class="mt-3 text-center">
        Already registered? <a href="login.html">Login</a>
      </p>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>

<!-- FOOTER -->
<footer class="fashion-footer">
  <div class="container">
    <div class="row py-2 justify-content-center">


      <!-- BRAND -->
      <div class="col-md-4 mb-2 text-center">
        <h4 class="fw-bold">FashionHub</h4>
        <p>Your one-stop destination for trendy fashion, exclusive deals, and stylish collections.</p>
      </div>

      <!-- QUICK LINKS -->
      <div class="col-md-4 mb-4 text-center">
        <h5 class="fw-semibold">Quick Links</h5>
        <div class="footer-inline-links mt-3">
          <a href="index.html">Home</a> |
          <a href="shop.html">Shop</a> |
          <a href="cart.html">Cart</a> |
          <a href="login.html">Login</a>
        </div>
      </div>

      <!-- CONTACT -->
      <div class="col-md-4 mb-4 text-center">
        <h5 class="fw-semibold">Contact Us</h5>
        <p><i class="bi bi-geo-alt"></i> Pune, India</p>
        <p><i class="bi bi-envelope"></i> support@fashionhub.com</p>
        <p><i class="bi bi-phone"></i> +91 99999 99999</p>
        <div class="social-icons mt-3">
          <a href="#"><i class="bi bi-facebook"></i></a>
          <a href="#"><i class="bi bi-instagram"></i></a>
          <a href="#"><i class="bi bi-twitter"></i></a>
        </div>
      </div>

    </div>

 <div class="text-center border-top pt-2 mt-2">

      <p class="mb-0">&copy; 2026 FashionHub. All Rights Reserved.</p>
    </div>
  </div>
</footer>

</body>
</html>
