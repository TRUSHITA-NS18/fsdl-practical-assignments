<!DOCTYPE html>
<html>
<head>
    <title>CA Appointment Booking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

    <div class="sidebar">
        <h2><i class="fa-solid fa-user-tie"></i> CAs</h2>

        <div class="ca-section">
            <h3>CA Rajesh Sharma (<span id="count1">0</span>)</h3>
            <div id="ca1Appointments"></div>
        </div>

        <div class="ca-section">
            <h3>CA Priya Mehta (<span id="count2">0</span>)</h3>
            <div id="ca2Appointments"></div>
        </div>

        <div class="ca-section">
            <h3>CA Amit Verma (<span id="count3">0</span>)</h3>
            <div id="ca3Appointments"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="form-container">
            <h1><i class="fa-solid fa-calendar-check"></i> Book Appointment</h1>

            <form id="appointmentForm">

                <label>Full Name</label>
                <input type="text" id="name" required>

                <label>Email Address</label>
                <input type="email" id="email" required>

                <label>Phone Number</label>
                <input type="text" id="phone" maxlength="10" required>

                <label>Select Chartered Accountant</label>
                <select id="caName" required>
                    <option value="">-- Select CA --</option>
                    <option value="CA Rajesh Sharma">CA Rajesh Sharma</option>
                    <option value="CA Priya Mehta">CA Priya Mehta</option>
                    <option value="CA Amit Verma">CA Amit Verma</option>
                </select>

                <label>Select Date</label>
                <input type="date" id="date" required>

                <label>Select Time</label>
                <input type="time" id="time" required>

                <label>Purpose of Meeting</label>
                <textarea id="purpose" required></textarea>

                <button type="submit">
                    <i class="fa-solid fa-paper-plane"></i> Book Appointment
                </button>

            </form>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
